name: Deep Agents Example

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for the agent'
        required: true

jobs:
  deepagents:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.comment.body, '@deepagents') &&
        github.event.issue.pull_request &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Acknowledge trigger
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='+1'

      - uses: actions/checkout@v4

      - name: Run Deep Agents
        uses: ./
        with:
          prompt: ${{ github.event.inputs.prompt || github.event.comment.body }}
          model: claude-sonnet-4-6
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Or: openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          # skills_repo: your-org/your-skills-repo@v1
